body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
.modal-overlay { transition: opacity .2s; }
.modal-overlay.hidden { opacity: 0; pointer-events: none; }
.modal-box { transition: transform .2s, opacity .2s; }
.modal-overlay.hidden .modal-box { transform: translateY(20px); opacity: 0; }
.toast { animation: toastIn .3s ease, toastOut .3s ease 1.7s forwards; }
@keyframes toastIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
.menu-sub { max-height: 0; overflow: hidden; transition: max-height .25s ease; }
.menu-sub.open { max-height: 200px; }
.menu-arrow { transition: transform .25s ease; }

th, td { border: 1px solid #f0f0f0; }

.form-scroll { max-height: 65vh; overflow-y: auto; }
</style>

<script>
// --- Tag Data Store ---
const tagData = {
  applyChannel: [],
  applyMerchant: [],
  excludeChannel: [],
  excludeMerchant: [],
};

function focusTagInput(key) {
  document.getElementById('tagInput-' + key).focus();
}

function handleTagKey(e, key) {
  const val = e.target.value.trim();
  if ((e.key === 'Enter' || e.key === ',' || e.key === '，') && val) {
    e.preventDefault();
    addTag(key, val.replace(/[,，]/g, ''));
    e.target.value = '';
  }
}

function addTag(key, value) {
  if (!value || tagData[key].includes(value)) return;
  tagData[key].push(value);
  renderTags(key);
}

function removeTag(key, value) {
  tagData[key] = tagData[key].filter(v => v !== value);
  renderTags(key);
}

function renderTags(key) {
  const wrap = document.getElementById('tagWrap-' + key);
  const input = document.getElementById('tagInput-' + key);
  wrap.querySelectorAll('.tag-item').forEach(t => t.remove());
  tagData[key].forEach(v => {
    const span = document.createElement('span');
    span.className = 'tag-item';
    span.innerHTML = v + ' <span class="tag-close" onclick="removeTag(\'' + key + '\',\'' + v + '\')">&times;</span>';
    wrap.insertBefore(span, input);
  });
}

// --- Data ---
const now = () => new Date().toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' }).replace(/\//g, '-');

let strategyList = [
  {
    id: 1, no: 'STR-20250101', name: '高风险省份拦截策略', areaDimension: '省', distance: null, locationMethod: '经纬度', merchantType: ['企业', '小微'],
    status: '启用', operator: '张三', updateTime: '2025-12-10 09:30:00',
    applyChannel: ['CH001', 'CH002'], applyMerchant: ['M001'],
    excludeChannel: [], excludeMerchant: ['M888'], remark: '针对高风险省份的拦截'
  },
  {
    id: 2, no: 'STR-20250102', name: '重点城市风控策略', areaDimension: '市', distance: null, locationMethod: 'IP', merchantType: ['个体'],
    status: '启用', operator: '李四', updateTime: '2025-12-11 14:20:00',
    applyChannel: ['CH003'], applyMerchant: [],
    excludeChannel: [], excludeMerchant: ['M666'], remark: ''
  },
  {
    id: 3, no: 'STR-20250103', name: '距离精细化拦截', areaDimension: '距离', distance: 5000, locationMethod: '经纬度', merchantType: ['企业', '个体', '小微', '事业单位', '其他组织'],
    status: '停用', operator: '王五', updateTime: '2025-12-12 16:45:00',
    applyChannel: [], applyMerchant: ['M002', 'M003'],
    excludeChannel: ['CH005'], excludeMerchant: [], remark: '距离级别精细化管控'
  },
  {
    id: 4, no: 'STR-20250104', name: '全省通用拦截规则', areaDimension: '省', distance: null, locationMethod: 'IP', merchantType: ['小微', '事业单位'],
    status: '启用', operator: '赵六', updateTime: '2025-12-13 11:00:00',
    applyChannel: ['CH010', 'CH011', 'CH012'], applyMerchant: ['M004'],
    excludeChannel: [], excludeMerchant: ['M999'], remark: ''
  },
];
let idSeq = 5;
let editingId = null;
let confirmCallback = null;

// --- Toast ---
function showToast(msg, type = 'success') {
  const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-primary' };
  const el = document.createElement('div');
  el.className = `toast ${colors[type] || colors.info} text-white px-5 py-2.5 rounded shadow-lg text-sm`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

// --- Location Method Change (linkage with areaDimension) ---
function onLocationMethodChange() {
  const locEl = document.querySelector('input[name="locationMethod"]:checked');
  const distanceLabel = document.getElementById('dimensionDistanceLabel');
  const distanceInputWrap = document.getElementById('distanceInputWrap');
  if (!locEl) return;
  if (locEl.value === '经纬度') {
    distanceLabel.classList.remove('hidden');
  } else {
    distanceLabel.classList.add('hidden');
    const dimEl = document.querySelector('input[name="areaDimension"]:checked');
    if (dimEl && dimEl.value === '距离') {
      document.querySelector('input[name="areaDimension"][value="省"]').checked = true;
      distanceInputWrap.classList.add('hidden');
      document.getElementById('formDistance').value = '';
    }
  }
}

// --- Dimension change ---
function onDimensionChange() {
  const dimEl = document.querySelector('input[name="areaDimension"]:checked');
  const distanceInputWrap = document.getElementById('distanceInputWrap');
  if (dimEl && dimEl.value === '距离') {
    distanceInputWrap.classList.remove('hidden');
  } else {
    distanceInputWrap.classList.add('hidden');
    document.getElementById('formDistance').value = '';
  }
}

// --- Render Table ---
function renderTable(data) {
  const tbody = document.getElementById('strategyTableBody');
  const empty = document.getElementById('emptyTip');
  if (!data.length) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  tbody.innerHTML = data.map(d => {
    const dimDisplay = d.areaDimension === '距离' ? `距离(${d.distance}米)` : d.areaDimension;
    return `
    <tr class="hover:bg-gray-50 transition-colors">
      <td class="px-3 py-3 text-textPrimary font-mono text-xs">${d.no}</td>
      <td class="px-3 py-3 text-textPrimary font-medium">${d.name}</td>
      <td class="px-3 py-3 text-textSecondary">${dimDisplay}</td>
      <td class="px-3 py-3"><span class="inline-block px-2 py-0.5 rounded text-xs font-medium ${d.locationMethod === '经纬度' ? 'bg-blue-50 text-blue-600' : 'bg-purple-50 text-purple-600'}">${d.locationMethod}</span></td>
      <td class="px-3 py-3 text-textSecondary">${Array.isArray(d.merchantType) ? d.merchantType.join("、") : d.merchantType}</td>
      <td class="px-3 py-3"><span class="inline-block px-2 py-0.5 rounded text-xs font-medium ${d.status === '启用' ? 'bg-green-50 text-green-600' : 'bg-gray-100 text-gray-500'}">${d.status}</span></td>
      <td class="px-3 py-3 text-textSecondary">${d.operator}</td>
      <td class="px-3 py-3 text-textSecondary text-xs">${d.updateTime}</td>
      <td class="px-3 py-3">
        <div class="flex items-center gap-2 flex-nowrap">
          <button onclick="openEditModal(${d.id})" class="text-primary hover:text-primaryHover text-xs transition-colors whitespace-nowrap">编辑</button>
          <button onclick="toggleStatus(${d.id})" class="text-primary hover:text-primaryHover text-xs transition-colors whitespace-nowrap">${d.status === '启用' ? '停用' : '启用'}</button>
          <button onclick="viewDetail(${d.id})" class="text-primary hover:text-primaryHover text-xs transition-colors whitespace-nowrap">查看详情</button>
          <button onclick="confirmDelete(${d.id})" class="text-danger hover:text-dangerHover text-xs transition-colors whitespace-nowrap">删除</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// --- Filter ---
function filterList() {
  const no = document.getElementById('filterStrategyNo').value.trim().toLowerCase();
  const name = document.getElementById('filterStrategyName').value.trim().toLowerCase();
  const channel = document.getElementById('filterChannelNo').value.trim();
  const merchant = document.getElementById('filterMerchantNo').value.trim();
  const status = document.getElementById('filterStatus').value;
  renderTable(strategyList.filter(d => {
    if (no && !d.no.toLowerCase().includes(no)) return false;
    if (name && !d.name.toLowerCase().includes(name)) return false;
    if (channel && !d.applyChannel.includes(channel)) return false;
    if (merchant && !d.applyMerchant.includes(merchant)) return false;
    if (status && d.status !== status) return false;
    return true;
  }));
}

function resetFilter() {
  document.getElementById('filterStrategyNo').value = '';
  document.getElementById('filterStrategyName').value = '';
  document.getElementById('filterChannelNo').value = '';
  document.getElementById('filterMerchantNo').value = '';
  document.getElementById('filterStatus').value = '';
  renderTable(strategyList);
}

// --- Modal: Add ---
function openAddModal() {
  editingId = null;
  document.getElementById('formModalTitle').textContent = '新增策略';
  clearForm();
  document.getElementById('formModal').classList.remove('hidden');
}

// --- Modal: Edit ---
function openEditModal(id) {
  const d = strategyList.find(x => x.id === id);
  if (!d) return;
  editingId = id;
  document.getElementById('formModalTitle').textContent = '编辑策略';
  clearForm();
  document.getElementById('formName').value = d.name;
  document.getElementById('formRemark').value = d.remark || '';
  document.querySelector(`input[name="locationMethod"][value="${d.locationMethod}"]`).checked = true;
  onLocationMethodChange();
  document.querySelector(`input[name="areaDimension"][value="${d.areaDimension}"]`).checked = true;
  onDimensionChange();
  if (d.areaDimension === '距离' && d.distance) {
    document.getElementById('formDistance').value = d.distance;
  }
  (d.merchantType || []).forEach(v => { const cb = document.querySelector(`input[name="merchantType"][value="${v}"]`); if (cb) cb.checked = true; });
  document.querySelector(`input[name="formStatus"][value="${d.status}"]`).checked = true;
  Object.keys(tagData).forEach(key => { tagData[key] = [...(d[key] || [])]; renderTags(key); });
  document.getElementById('formModal').classList.remove('hidden');
}

function clearForm() {
  document.getElementById('formName').value = '';
  document.getElementById('formRemark').value = '';
  document.getElementById('formDistance').value = '';
  document.querySelectorAll('input[name="areaDimension"]').forEach(r => r.checked = false);
  document.querySelectorAll('input[name="locationMethod"]').forEach(r => r.checked = false);
  document.querySelectorAll('input[name="merchantType"]').forEach(r => r.checked = false);
  document.querySelector('input[name="formStatus"][value="启用"]').checked = true;
  document.getElementById('dimensionDistanceLabel').classList.remove('hidden');
  document.getElementById('distanceInputWrap').classList.add('hidden');
  Object.keys(tagData).forEach(key => { tagData[key] = []; renderTags(key); });
  document.querySelectorAll('.tag-input-wrap input').forEach(i => i.value = '');
}

function closeFormModal() {
  document.getElementById('formModal').classList.add('hidden');
}

// --- Cross-strategy validation for applyChannel and applyMerchant ---
function checkDuplicateInApply(list, field, label, excludeId) {
  const conflicts = [];
  list.forEach(val => {
    for (const s of strategyList) {
      if (s.id === excludeId) continue;
      if ((s[field] || []).includes(val)) {
        conflicts.push({ value: val, strategy: s.name });
        break;
      }
    }
  });
  return conflicts;
}

function submitForm() {
  const name = document.getElementById('formName').value.trim();
  const remark = document.getElementById('formRemark').value.trim();
  const dimEl = document.querySelector('input[name="areaDimension"]:checked');
  const locEl = document.querySelector('input[name="locationMethod"]:checked');
  const mtypeChecked = document.querySelectorAll('input[name="merchantType"]:checked');
  const statusEl = document.querySelector('input[name="formStatus"]:checked');
  const distance = parseInt(document.getElementById('formDistance').value);

  if (!name) { showToast('请输入策略名称', 'error'); return; }
  if (!locEl) { showToast('请选择地理位置转换方式', 'error'); return; }
  if (!dimEl) { showToast('请选择区域维度', 'error'); return; }
  if (dimEl.value === '距离' && (isNaN(distance) || distance < 1)) { showToast('请输入有效距离（米）', 'error'); return; }
  if (!mtypeChecked.length) { showToast('请选择至少一种商户类型', 'error'); return; }
  if (!statusEl) { showToast('请选择策略状态', 'error'); return; }

  // Cross-strategy validation: applyChannel and applyMerchant must be unique across strategies
  const channelConflicts = checkDuplicateInApply(tagData.applyChannel, 'applyChannel', '渠道号', editingId);
  const merchantConflicts = checkDuplicateInApply(tagData.applyMerchant, 'applyMerchant', '商户号', editingId);
  if (channelConflicts.length) {
    const msg = channelConflicts.map(c => `渠道号 ${c.value} 已在策略【${c.strategy}】的适用范围中`).join('；');
    showToast(msg, 'error'); return;
  }
  if (merchantConflicts.length) {
    const msg = merchantConflicts.map(c => `商户号 ${c.value} 已在策略【${c.strategy}】的适用范围中`).join('；');
    showToast(msg, 'error'); return;
  }

  const obj = {
    name, remark,
    areaDimension: dimEl.value,
    distance: dimEl.value === '距离' ? distance : null,
    locationMethod: locEl.value,
    merchantType: Array.from(mtypeChecked).map(el => el.value),
    status: statusEl.value,
    applyChannel: [...tagData.applyChannel],
    applyMerchant: [...tagData.applyMerchant],
    excludeChannel: [...tagData.excludeChannel],
    excludeMerchant: [...tagData.excludeMerchant],
  };

  if (editingId !== null) {
    const idx = strategyList.findIndex(x => x.id === editingId);
    if (idx > -1) {
      Object.assign(strategyList[idx], obj, { operator: '当前用户', updateTime: now() });
    }
    showToast('策略编辑成功');
  } else {
    const no = 'STR-' + (20250100 + idSeq);
    strategyList.push({ id: idSeq++, no, ...obj, operator: '当前用户', updateTime: now() });
    showToast('策略新增成功');
  }
  closeFormModal();
  filterList();
}

// --- Toggle Status ---
function toggleStatus(id) {
  const d = strategyList.find(x => x.id === id);
  if (!d) return;
  d.status = d.status === '启用' ? '停用' : '启用';
  d.operator = '当前用户';
  d.updateTime = now();
  renderTable(strategyList);
  showToast('策略已' + d.status);
}

// --- View Detail ---
function viewDetail(id) {
  const d = strategyList.find(x => x.id === id);
  if (!d) return;
  const tagHtml = (arr) => arr.length ? arr.map(v => `<span class="tag-item">${v}</span>`).join(' ') : '<span class="text-xs text-textSecondary">未配置</span>';
  const dimDisplay = d.areaDimension === '距离' ? `距离(${d.distance}米)` : d.areaDimension;
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">① 基本信息</div>
      <div class="grid grid-cols-2 gap-x-8 gap-y-3 text-sm">
        <div><span class="text-textSecondary">策略号：</span><span class="text-textPrimary font-mono">${d.no}</span></div>
        <div><span class="text-textSecondary">策略名称：</span><span class="text-textPrimary font-medium">${d.name}</span></div>
        <div><span class="text-textSecondary">备注：</span><span class="text-textPrimary">${d.remark || '--'}</span></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">② 区域配置</div>
      <div class="grid grid-cols-2 gap-x-8 gap-y-3 text-sm">
        <div><span class="text-textSecondary">地理位置转换方式：</span><span class="text-textPrimary">${d.locationMethod}</span></div>
        <div><span class="text-textSecondary">区域维度：</span><span class="text-textPrimary">${dimDisplay}</span></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">③ 商户类型</div>
      <div class="text-sm"><span class="text-textPrimary">${Array.isArray(d.merchantType) ? d.merchantType.join("、") : d.merchantType}</span></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">④ 适用范围</div>
      <div class="space-y-2 text-sm">
        <div><span class="text-textSecondary">适用渠道号：</span>${tagHtml(d.applyChannel)}</div>
        <div><span class="text-textSecondary">适用商户号：</span>${tagHtml(d.applyMerchant)}</div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">⑤ 不适用范围</div>
      <div class="space-y-2 text-sm">
        <div><span class="text-textSecondary">不适用渠道号：</span>${tagHtml(d.excludeChannel)}</div>
        <div><span class="text-textSecondary">不适用商户号：</span>${tagHtml(d.excludeMerchant)}</div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">⑥ 策略状态</div>
      <div class="text-sm"><span class="inline-block px-2 py-0.5 rounded text-xs font-medium ${d.status === '启用' ? 'bg-green-50 text-green-600' : 'bg-gray-100 text-gray-500'}">${d.status}</span></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">其他信息</div>
      <div class="grid grid-cols-2 gap-x-8 gap-y-3 text-sm">
        <div><span class="text-textSecondary">操作人：</span><span class="text-textPrimary">${d.operator}</span></div>
        <div><span class="text-textSecondary">更新时间：</span><span class="text-textPrimary">${d.updateTime}</span></div>
      </div>
    </div>`;
  document.getElementById('detailModal').classList.remove('hidden');
}

function closeDetailModal() {
  document.getElementById('detailModal').classList.add('hidden');
}

// --- Delete ---
function confirmDelete(id) {
  const d = strategyList.find(x => x.id === id);
  showConfirm(`确认要删除策略【${d.name}】吗？删除后不可恢复。`, () => {
    strategyList = strategyList.filter(x => x.id !== id);
    renderTable(strategyList);
    showToast('删除成功');
  });
}

// --- Confirm Modal ---
function showConfirm(msg, cb) {
  document.getElementById('confirmMsg').textContent = msg;
  confirmCallback = cb;
  document.getElementById('confirmModal').classList.remove('hidden');
}

function cancelConfirm() {
  confirmCallback = null;
  document.getElementById('confirmModal').classList.add('hidden');
}

function doConfirm() {
  if (confirmCallback) confirmCallback();
  confirmCallback = null;
  document.getElementById('confirmModal').classList.add('hidden');
}

// --- Close modals on overlay click ---
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.add('hidden');
  });
});

// --- Init ---
renderTable(strategyList);
</script>
</body>
